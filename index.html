<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Miles & Meals Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#071318; --surface:#0d1f26; --surface2:#142a33; --surface3:#1a3540;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --text:#e0f4f8; --text2:#6bb8c8; --text3:#3d7a88;
    --accent:#00c4cc; --accent-dim:rgba(0,196,204,0.15);
    --green:#3ecf8e; --green-dim:rgba(62,207,142,0.15);
    --amber:#f0a429; --amber-dim:rgba(240,164,41,0.12);
    --red:#f05252; --red-dim:rgba(240,82,82,0.12);
    --t1:#00c4cc; --t2:#3ecf8e; --t3:#f0a429;
    --t1-dim:rgba(0,196,204,0.15); --t2-dim:rgba(62,207,142,0.15); --t3-dim:rgba(240,164,41,0.12);
    --radius:16px; --radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);}
  .page{display:none;min-height:100vh;flex-direction:column;}
  .page.active{display:flex;}
  #login-page{align-items:center;justify-content:center;padding:24px;}
  .login-box{width:100%;max-width:380px;}
  .brand{text-align:center;margin-bottom:24px;}
  .brand-icon{font-size:44px;display:block;margin-bottom:10px;animation:bounce 2s infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .brand h1{font-size:22px;font-weight:600;letter-spacing:-0.5px;}
  .brand p{font-size:13px;color:var(--text2);margin-top:4px;}
  .event-pill{display:inline-block;background:var(--accent-dim);border:1px solid rgba(124,106,247,0.3);border-radius:999px;padding:4px 14px;font-size:11px;font-weight:600;color:var(--accent);margin-top:8px;letter-spacing:0.04em;}
  .section-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:8px;}
  .name-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;}
  .name-btn{padding:11px 8px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;text-align:center;transition:all 0.15s;}
  .name-btn.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
  .login-btn{width:100%;padding:15px;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;opacity:0.35;transition:opacity 0.15s;}
  .login-btn:not([disabled]){opacity:1;}
  #dashboard-page{background:var(--bg);}
  .dash-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;gap:8px;}
  .dash-left{display:flex;align-items:center;gap:10px;}
  .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;background:var(--accent-dim);border:1.5px solid var(--accent);color:var(--accent);}
  .uname{font-weight:600;font-size:14px;}
  .uteam{font-size:11px;color:var(--text3);}
  .signout{padding:6px 12px;border-radius:999px;border:1px solid var(--border2);background:none;color:var(--text2);font-size:12px;cursor:pointer;}
  .scroll{flex:1;overflow-y:auto;padding:14px 14px 90px;}
  .goal-setup{background:var(--accent-dim);border:1px solid rgba(124,106,247,0.25);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
  .goal-setup-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
  .goal-setup-sub{font-size:12px;color:var(--text2);margin-bottom:10px;}
  .goal-row{display:flex;gap:8px;align-items:center;}
  .goal-row input{flex:1;padding:10px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
  .goal-row input:focus{border-color:var(--accent);}
  .goal-btn{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .pts-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:12px;border:1px solid var(--border);}
  .pts-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .pts-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;}
  .pts-badge{background:var(--accent-dim);border:1px solid rgba(124,106,247,0.3);border-radius:999px;padding:3px 10px;font-size:12px;font-weight:700;color:var(--accent);}
  .pts-row{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;}
  .pts-day{border-radius:8px;padding:6px 4px;text-align:center;border:1px solid var(--border);}
  .pts-day.hit{background:var(--green-dim);border-color:rgba(62,207,142,0.3);}
  .pts-day.miss{background:var(--red-dim);border-color:rgba(240,82,82,0.15);}
  .pts-day.future{background:var(--surface2);border-color:var(--border);}
  .pts-day.today{border-color:var(--accent);background:var(--accent-dim);}
  .pd-date{font-size:9px;color:var(--text3);margin-bottom:3px;}
  .pd-icon{font-size:14px;line-height:1;}
  .pd-pts{font-size:9px;font-weight:700;margin-top:2px;}
  .pts-day.hit .pd-pts{color:var(--green);}
  .pts-day.miss .pd-pts{color:var(--red);}
  .pts-day.today .pd-pts{color:var(--accent);}
  .metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px;}
  .metric{background:var(--surface);border-radius:var(--radius-sm);padding:11px 8px;text-align:center;}
  .mv{font-size:18px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace;}
  .ml{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
  .tabs{display:flex;background:var(--surface);border-radius:var(--radius);padding:3px;gap:2px;margin-bottom:14px;}
  .tab{flex:1;padding:9px 4px;border-radius:12px;border:none;font-size:12px;font-weight:500;background:none;color:var(--text2);cursor:pointer;transition:all 0.15s;}
  .tab.active{background:var(--surface2);color:var(--text);}
  .panel{display:none;}
  .panel.active{display:block;}
  .add-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
  .frow{display:flex;gap:8px;align-items:flex-end;margin-bottom:12px;}
  .frow .field{flex:1;}
  .flabel{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;}
  input[type=date],input[type=number]{width:100%;padding:11px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;}
  input:focus{border-color:var(--accent);}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  .save-btn{padding:11px 16px;background:var(--green);color:#0a1f15;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .hint{font-size:12px;color:var(--amber);margin:-4px 0 10px;padding:0 2px;}
  .sh{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;}
  .eitem{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
  .eitem:last-child{border-bottom:none;}
  .edate{font-size:12px;color:var(--text2);margin-top:1px;}
  .esteps{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;}
  .esteps.hit{color:var(--green);}
  .esteps.miss{color:var(--text2);}
  .epill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:6px;}
  .epill.hit{background:var(--green-dim);color:var(--green);}
  .epill.miss{background:var(--red-dim);color:var(--red);}
  .delbtn{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 0 0 8px;}
  .empty{text-align:center;padding:24px;color:var(--text3);font-size:13px;}
  .team-section{margin-bottom:14px;}
  .team-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;border:1px solid var(--border);border-bottom:none;}
  .team-hdr.t1{background:var(--t1-dim);border-color:rgba(0,196,204,0.25);}
  .team-hdr.t2{background:var(--t2-dim);border-color:rgba(62,207,142,0.25);}
  .team-hdr.t3{background:var(--t3-dim);border-color:rgba(240,164,41,0.25);}
  .team-name-lbl{font-size:13px;font-weight:700;}
  .t1 .team-name-lbl{color:var(--t1);}
  .t2 .team-name-lbl{color:var(--t2);}
  .t3 .team-name-lbl{color:var(--t3);}
  .team-pts-lbl{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;}
  .t1 .team-pts-lbl{color:var(--t1);}
  .t2 .team-pts-lbl{color:var(--t2);}
  .t3 .team-pts-lbl{color:var(--t3);}
  .team-body{background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);overflow:hidden;}
  .member-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);}
  .member-row:last-child{border-bottom:none;}
  .m-av{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text2);flex-shrink:0;}
  .m-name{font-size:13px;font-weight:500;flex:1;}
  .m-goal{font-size:11px;color:var(--text3);}
  .m-pts{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--text);}
  .m-streak{display:flex;gap:2px;margin-left:6px;}
  .m-dot{width:7px;height:7px;border-radius:50%;}
  .m-dot.hit{background:var(--green);}
  .m-dot.miss{background:var(--red-dim);border:1px solid rgba(240,82,82,0.3);}
  .m-dot.future{background:var(--surface3);}
  .bonus-banner{border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;font-size:12px;}
  .bonus-banner.on-track{background:var(--green-dim);border:1px solid rgba(62,207,142,0.2);color:var(--green);}
  .bonus-banner.off-track{background:var(--red-dim);border:1px solid rgba(240,82,82,0.15);color:var(--red);}
  .bonus-banner.pending{background:var(--amber-dim);border:1px solid rgba(240,164,41,0.2);color:var(--amber);}
  .bnav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 max(6px,env(safe-area-inset-bottom));flex-shrink:0;}
  .nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0;}
  .nicon{font-size:18px;}
  .nlabel{font-size:10px;font-weight:500;color:var(--text3);}
  .nbtn.active .nlabel{color:var(--accent);}
  .toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);padding:8px 16px;border-radius:999px;font-size:13px;font-weight:500;opacity:0;transition:all 0.25s;pointer-events:none;z-index:100;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="login-page" class="page active">
  <div class="login-box">
    <div class="brand">
      <span class="brand-icon">🎯</span>
      <h1>Miles & Meals</h1>
      <p>Consistency & Commitment Challenge</p>
      <span class="event-pill">📅 17 Apr – 24 Apr 2026</span>
    </div>
    <p class="section-label">Select your team</p>
    <div id="team-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;"></div>
    <button onclick="showAdminLogin()" style="width:100%;padding:11px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;">
      <span style="font-size:14px;">🔐</span> Admin Access
    </button>
    <div id="name-section" style="display:none;">
      <p class="section-label">Select your name</p>
      <div class="name-grid" id="name-grid"></div>
    </div>
    <button class="login-btn" id="login-btn" disabled onclick="doLogin()">Let's Go →</button>
  </div>
</div>
<div id="dashboard-page" class="page">
  <div class="dash-hdr">
    <div class="dash-left">
      <div class="av" id="dash-av"></div>
      <div><div class="uname" id="dash-name"></div><div class="uteam" id="dash-team"></div></div>
    </div>
    <button class="signout" onclick="doLogout()">Sign out</button>
  </div>
  <div id="step-tiles" style="display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;"></div>
  <div class="scroll">
    <div id="goal-setup-wrap"></div>
    <div id="pts-card-wrap"></div>
    <div class="metrics" id="metrics"></div>
    <div class="tabs">
      <button class="tab active" id="tb-add" onclick="switchTab('add')">➕ Steps</button>
      <button class="tab" id="tb-board" onclick="switchTab('board')">🏆 My Team</button>
      <button class="tab" id="tb-data" onclick="switchTab('data')" style="display:none">📋 Data</button>
      <button class="tab" id="tb-twists" onclick="switchTab('twists')" style="display:none">⚡ Twists</button>
    </div>
    <div class="panel active" id="panel-add">
      <div class="add-card">
        <div class="frow">
          <div class="field"><div class="flabel">Date</div><input type="date" id="step-date" onchange="onDateChange()"/></div>
          <div class="field"><div class="flabel">Steps</div><input type="number" id="step-count" placeholder="e.g. 8000" inputmode="numeric"/></div>
          <button class="save-btn" onclick="addSteps()">Save</button>
        </div>
        <div id="step-hint"></div>
      </div>
      <div class="sh">My entries</div>
      <div id="my-entries" style="background:var(--surface);border-radius:var(--radius);padding:4px 12px;"><div class="empty">Loading...</div></div>
    </div>
    <div class="panel" id="panel-board">
      <div id="board-team-tabs" style="display:none;margin-bottom:12px;"></div>
      <div id="team-board"><div class="empty">Loading...</div></div>
    </div>
    <div class="panel" id="panel-data">
      <div id="data-entry-wrap"></div>
    </div>
    <div class="panel" id="panel-twists">
      <div id="twists-wrap"></div>
    </div>
  </div>
  <nav class="bnav">
    <button class="nbtn active" id="nav-add" onclick="switchTab('add')"><span class="nicon">➕</span><span class="nlabel">Steps</span></button>
    <button class="nbtn" id="nav-board" onclick="switchTab('board')"><span class="nicon">🏆</span><span class="nlabel">My Team</span></button>
    <button class="nbtn" id="nav-data" onclick="switchTab('data')" style="display:none"><span class="nicon">📋</span><span class="nlabel">Data</span></button>
    <button class="nbtn" id="nav-twists" onclick="switchTab('twists')" style="display:none"><span class="nicon">⚡</span><span class="nlabel">Twists</span></button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<div id="admin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;align-items:flex-end;justify-content:center;">
  <div style="background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px 36px;width:100%;max-width:480px;">
    <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;">🔐 Admin Login</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:16px;">Enter admin password to access all team data</div>
    <input type="password" id="admin-pwd" placeholder="Password" style="width:100%;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:6px;"/>
    <div id="admin-err" style="font-size:12px;color:var(--red);margin-bottom:10px;display:none;">Incorrect password. Try again.</div>
    <div style="display:flex;gap:8px;">
      <button onclick="closeAdminModal()" style="flex:1;padding:13px;background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:14px;cursor:pointer;">Cancel</button>
      <button onclick="doAdminLogin()" style="flex:2;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;">Login as Admin</button>
    </div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://osunxzedvlpcmaplntub.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zdW54emVkdmxwY21hcGxudHViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDE5MzAsImV4cCI6MjA5MDcxNzkzMH0.VgfNj_0LUfeTlT-07pSpf5lJk7uFQVuBW4VpE_PihAg';
const CHALLENGE_START='2026-04-17';
const CHALLENGE_END='2026-04-24';
const POINTS_PER_DAY=10;
const BONUS_POINTS=500;
const MIN_GOAL=5000;
const MAX_POINT_DAYS=7;
const CHALLENGE_DATES=[];
let d=new Date(CHALLENGE_START);
while(d<=new Date(CHALLENGE_END)){CHALLENGE_DATES.push(d.toISOString().split('T')[0]);d.setDate(d.getDate()+1);}
const TEAMS={'Nilam':{color:'var(--t1)',cls:'t1',emoji:'🌍'},'Neer':{color:'var(--t2)',cls:'t2',emoji:'🌊'},'Kaatru':{color:'var(--t3)',cls:'t3',emoji:'🌬️'}};

const TEAM_BONUS_THRESHOLD={'Nilam':12,'Neer':12,'Kaatru':12};
let currentUser=null,currentTeam=null,allEntries=[],allGoals=[],allTwists=[],allTwistCompletions=[],refreshTimer=null;

function cleanName(n){return n.replace(/^⚑\s*/,'').trim();}

async function sb(method,path,body){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{method,headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':'application/json','Cache-Control':'no-cache','Prefer':method==='POST'?'resolution=merge-duplicates,return=representation':''},body:body?JSON.stringify(body):undefined});
  if(!res.ok)throw new Error(`${res.status}: ${await res.text()}`);
  const t=await res.text();return t?JSON.parse(t):[];
}
async function loadAll(){
  try{
    [allEntries,allGoals,allTwists,allTwistCompletions]=await Promise.all([
      sb('GET','cc_steps?select=*&order=date.desc'),
      sb('GET','cc_goals?select=*'),
      sb('GET','cc_twists?select=*&order=created_at.asc'),
      sb('GET','cc_twist_completions?select=*')
    ]);
  }catch(e){console.error('Load error:',e.message);allEntries=[];allGoals=[];allTwists=[];allTwistCompletions=[];}
}
function getUserGoal(user){const clean=cleanName(user);const g=allGoals.find(g=>g.user_name===clean);return g?g.goal_steps:null;}
function calcPoints(user){
  const goal=getUserGoal(user);
  if(!goal)return{points:0,days:[]};
  const today=new Date().toISOString().split('T')[0];
  const dbName=cleanName(user);
  const days=CHALLENGE_DATES.map(date=>{
    const entry=allEntries.find(e=>e.user_name===dbName&&e.date===date);
    if(!entry)return date<=today?'miss':'future';
    return entry.steps>=goal?'hit':'miss';
  });
  const hitCount=days.filter(d=>d==='hit').length;
  const points=Math.min(hitCount,MAX_POINT_DAYS)*POINTS_PER_DAY;
  return{points,days};
}
function calcTeamPoints(team){
  const members=MEMBERS.filter(m=>m.team===team);
  const maxPts=MAX_POINT_DAYS*POINTS_PER_DAY;
  const threshold=TEAM_BONUS_THRESHOLD[team]||12;
  let total=0,membersAtMax=0;
  members.forEach(m=>{const{points}=calcPoints(m.name);total+=points;if(points>=maxPts)membersAtMax++;});
  const bonusEligible=membersAtMax>=threshold;
  const today=new Date().toISOString().split('T')[0];
  if(bonusEligible&&today>CHALLENGE_END)total+=BONUS_POINTS;
  // Add twist bonus points
  const twistPts=allTwistCompletions
    .filter(c=>c.team===team)
    .reduce((s,c)=>{const tw=allTwists.find(t=>t.id===c.twist_id);return s+(tw?tw.bonus_points:0);},0);
  total+=twistPts;
  return{total,bonusEligible,membersAtMax,threshold,twistPts};
}

        <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:600;color:var(--text);">${m.name}</div><div style="font-size:10px;color:var(--text3);">Goal: ${goal?goal.toLocaleString('en-IN'):'not set'}</div></div>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="number" id="as-${sid}" value="${entry?entry.steps:''}" placeholder="—" inputmode="numeric" style="width:90px;padding:7px 10px;background:var(--surface2);border:1.5px solid ${ib};border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;text-align:right;"/>
          <button onclick="adminSaveEntry('${cleanName(m.name)}','${adminSelDate}')" style="padding:7px 12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;">${entry?'Update':'Save'}</button>
        </div></div>`;
    }).join('');
  }
  const t=TEAMS[adminSelTeam]||TEAMS[Object.keys(TEAMS)[0]];
  const teamHeader = isAdmin
    ? `<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;">Select Team</div>
       <div style="display:flex;gap:6px;margin-bottom:${adminSelTeam?'14px':'0'};">${teamBtns}</div>`
    : `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="font-size:20px;">${t.emoji}</span>
        <span style="font-size:14px;font-weight:700;color:${t.color};">Team ${adminSelTeam}</span>
        <span style="font-size:11px;color:var(--text3);">— your team</span>
       </div>`;
  el.innerHTML=`<div style="background:var(--surface);border-radius:var(--radius);padding:14px;">
    ${teamHeader}
    ${adminSelTeam?`<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;">Select Date</div><div style="display:flex;gap:4px;">${dateBtns}</div>`:''}
  </div>
  ${adminSelTeam&&adminSelDate?`<div style="background:var(--surface);border-radius:var(--radius);padding:4px 14px;margin-top:12px;">
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;padding:10px 0 4px;">${TEAMS[adminSelTeam].emoji} ${adminSelTeam} &middot; ${parseInt(adminSelDate.split('-')[2])} Apr</div>
    ${memberRows}</div>`:''}`;
}
function adminPickTeam(team){adminSelTeam=team;adminSelDate=null;renderDataEntry();}
function adminPickDate(date){adminSelDate=date;renderDataEntry();}
async function adminSaveEntry(userName,date){
  const sid=userName.replace(/\s+/g,'-');
  const input=document.getElementById(`as-${sid}`);
  const steps=parseInt(input?.value);
  if(!steps||steps<1){showToast(`Enter valid steps for ${userName}`);return;}
  try{
    await sb('POST','cc_steps?on_conflict=user_name,date',{user_name:userName,date,steps});
    showToast(`${userName} — ${steps.toLocaleString('en-IN')} steps saved ✓`);
    await loadAll();renderDataEntry();renderTeamBoard();renderStepTiles();
  }catch(e){showToast('Save failed: '+e.message.slice(0,40));}
}

async function renderLoginScores(){
  try{
    await loadAll();
    Object.keys(TEAMS).forEach(team=>{
      const el=document.getElementById('score-'+team);
      if(el)el.textContent=calcTeamPoints(team).total;
    });
  }catch(e){console.error('login scores:',e);}
}

// ── TWISTS ──
async function loadTwists(){
  try{
    const [twists, completions] = await Promise.all([
      sb('GET','cc_twists?select=*&order=created_at.asc'),
      sb('GET','cc_twist_completions?select=*')
    ]);
    return {twists, completions};
  }catch(e){console.error('loadTwists:',e);return{twists:[],completions:[]};}
}

async function renderTwists(){
  const el=document.getElementById('twists-wrap');
  if(!el)return;
  el.innerHTML='<div class="empty">Loading...</div>';
  await loadAll();
  const twists=allTwists;
  const completions=allTwistCompletions;

  const canCreate=isAdmin;
  const canComplete=isAdmin||isCaptain(currentUser);

  // Add twist form (admin only)
  const addForm=canCreate?`
    <div style="background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:12px;border:1px solid var(--border);">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;">⚡ Add New Twist</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <input type="text" id="twist-title" placeholder="Twist title e.g. Walk to work today!" style="width:100%;padding:10px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;"/>
        <textarea id="twist-desc" placeholder="Description (optional)" rows="2" style="width:100%;padding:10px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:none;"></textarea>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="number" id="twist-pts" placeholder="Bonus pts e.g. 50" inputmode="numeric" style="flex:1;padding:10px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;"/>
          <button onclick="createTwist()" style="padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;">Add Twist</button>
        </div>
      </div>
    </div>`:''

  if(!twists.length){
    el.innerHTML=addForm+`<div class="empty">${isAdmin?'No twists yet — add the first one!':'No surprise twists yet — stay tuned! ⚡'}</div>`;
    return;
  }

  const twistCards=twists.map((tw,i)=>{
    const teamCompletions={};
    completions.filter(c=>c.twist_id===tw.id).forEach(c=>teamCompletions[c.team]=true);
    const myTeamDone=teamCompletions[currentTeam]||false;
    const doneCount=Object.keys(teamCompletions).length;

    const teamPills=Object.keys(TEAMS).map(team=>{
      const done=teamCompletions[team];
      const t=TEAMS[team];
      return `<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:${done?'rgba(62,207,142,0.15)':'var(--surface2)'};color:${done?'var(--green)':'var(--text3)'};border:1px solid ${done?'rgba(62,207,142,0.3)':'var(--border)'};">${t.emoji} ${team} ${done?'✓':''}</span>`;
    }).join('');

    const myTeam=currentTeam||adminBoardTeam||Object.keys(TEAMS)[0];
    const canMark=(isAdmin||isCaptain(currentUser))&&!teamCompletions[myTeam];
    const canRevert=(isAdmin||isCaptain(currentUser))&&teamCompletions[myTeam];
    const markBtn=canMark?`<button onclick="markTwistDone(${tw.id},'${myTeam}')" style="padding:8px 14px;background:var(--green);color:#0a1f15;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">✓ Mark Done</button>`:
      (canRevert?`<button onclick="revertTwist(${tw.id},'${myTeam}')" style="padding:8px 14px;background:none;border:1px solid rgba(240,82,82,0.4);border-radius:var(--radius-sm);color:var(--red);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;">↩ Revert</button>`:
      (teamCompletions[myTeam]?`<span style="font-size:12px;color:var(--green);font-weight:600;">✓ Completed!</span>`:'')));

    const deletBtn=isAdmin?`<button onclick="deleteTwist(${tw.id})" style="padding:6px 10px;background:none;border:1px solid rgba(240,82,82,0.3);border-radius:var(--radius-sm);color:var(--red);font-size:11px;cursor:pointer;">Delete</button>`:'';

    return `<div style="background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid ${myTeamDone?'rgba(62,207,142,0.25)':'var(--border)'};">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:26px;height:26px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--accent);flex-shrink:0;">${i+1}</div>
          <div>
            <div style="font-size:14px;font-weight:700;color:var(--text);">${tw.title}</div>
            ${tw.description?`<div style="font-size:12px;color:var(--text2);margin-top:2px;">${tw.description}</div>`:''}
          </div>
        </div>
        <div style="background:var(--amber-dim);border:1px solid rgba(240,164,41,0.3);border-radius:999px;padding:4px 10px;font-size:12px;font-weight:800;color:var(--amber);white-space:nowrap;flex-shrink:0;">+${tw.bonus_points} pts</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">${teamPills}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div style="font-size:11px;color:var(--text3);">${doneCount}/3 teams completed</div>
        <div style="display:flex;gap:6px;">${deletBtn}${markBtn}</div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML=addForm+twistCards;
}

async function createTwist(){
  const title=document.getElementById('twist-title')?.value.trim();
  const desc=document.getElementById('twist-desc')?.value.trim();
  const pts=parseInt(document.getElementById('twist-pts')?.value);
  if(!title){showToast('Enter a twist title');return;}
  if(!pts||pts<1){showToast('Enter bonus points');return;}
  const allTwists=await sb('GET','cc_twists?select=*');
  if(allTwists.length>=7){showToast('Max 7 twists allowed!');return;}
  try{
    await sb('POST','cc_twists',{title,description:desc||null,bonus_points:pts});
    showToast('Twist added! ⚡');
    renderTwists();
  }catch(e){showToast('Error: '+e.message.slice(0,40));}
}

async function markTwistDone(twistId,team){
  try{
    await sb('POST','cc_twist_completions',{twist_id:twistId,team});
    showToast(`✓ Twist completed for ${team}! Points added!`);
    await loadAll();renderTwists();renderTeamBoard();renderMetrics();
  }catch(e){showToast('Error: '+e.message.slice(0,40));}
}

async function revertTwist(twistId,team){
  try{
    await sb('DELETE',`cc_twist_completions?twist_id=eq.${twistId}&team=eq.${team}`);
    showToast(`↩ Reverted for ${team} — points removed`);
    await loadAll();renderTwists();renderTeamBoard();renderMetrics();
  }catch(e){showToast('Error: '+e.message.slice(0,40));}
}

async function deleteTwist(twistId){
  try{
    await sb('DELETE',`cc_twist_completions?twist_id=eq.${twistId}`);
    await sb('DELETE',`cc_twists?id=eq.${twistId}`);
    showToast('Twist deleted');
    renderTwists();
  }catch(e){showToast('Error: '+e.message.slice(0,40));}
}

// Include twist bonus in team points
async function calcTeamPointsWithTwists(team){
  const base=calcTeamPoints(team);
  try{
    const completions=await sb('GET',`cc_twist_completions?team=eq.${team}&select=*`);
    const twistIds=completions.map(c=>c.twist_id);
    if(!twistIds.length)return base;
    const twists=await sb('GET',`cc_twists?id=in.(${twistIds.join(',')})&select=bonus_points`);
    const twistPts=twists.reduce((s,t)=>s+t.bonus_points,0);
    return{...base,total:base.total+twistPts,twistPts};
  }catch(e){return base;}
}

function switchTab(tab){
  ['add','board','data','twists'].forEach(t=>{
    const p=document.getElementById(`panel-${t}`);const tb=document.getElementById(`tb-${t}`);const nav=document.getElementById(`nav-${t}`);
    if(p)p.classList.toggle('active',t===tab);if(tb)tb.classList.toggle('active',t===tab);if(nav)nav.classList.toggle('active',t===tab);
  });
  if(tab==='data')renderDataEntry();
  if(tab==='twists')renderTwists();
}
function fmt(n){return Math.round(n).toLocaleString('en-IN');}
function fd(d){return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

buildGrid();
renderLoginScores();
</script>
</body>
